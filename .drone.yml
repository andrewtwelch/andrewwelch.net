---
kind: pipeline
type: docker
name: default
trigger:
  branch:
    - main
  event:
    - push

steps:
- name: Submodules
  image: alpine/git
  commands:
  - git submodule update --init --recursive

- name: Version check
  image: andrewtwelch/docker-hugo
  commands:
  - echo "Checking Hugo version."
  - hugo version

- name: Build
  image: andrewtwelch/docker-hugo
  commands:
  - hugo --minify --destination /drone/src/build

- name: Upload
  image: andrewtwelch/docker-hugo
  commands:
  - eval `ssh-agent -s`
  - echo "$SSH_KEY" | ssh-add -
  - mkdir -p ~/.ssh
  - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  - rsync -rv -e "ssh -p 22" /drone/src/build/ drone@web01.home.andrewwelch.net:/var/www/andrewwelch/ --checksum
  environment:
    SSH_KEY:
      from_secret: drone_ssh_key


